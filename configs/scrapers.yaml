# ---------------------------------------------------------------------------
# Scraper configuration for hardware-pulse
#
# Precedence rules:
# job.* overrides scraper.defaults.* overrides global.*
#
# request_delay applies between HTTP requests.
# ---------------------------------------------------------------------------

global:
    request_delay: 1.0
    timeout: 10

thot:
    enabled: true

    defaults:
        request_delay: 1.5
        max_pages_per_url: 20

    jobs:
        - name: gpu_category
          urls:
              - https://thotcomputacion.com.uy/categoria-producto/tarjetas-de-video/

        - name: cpu_category
          urls:
              - https://thotcomputacion.com.uy/categoria-producto/procesadores/

        - name: ram_category
          urls:
              - https://thotcomputacion.com.uy/categoria-producto/memorias/

        - name: ssd_category
          urls:
              - https://thotcomputacion.com.uy/categoria-producto/almacenamiento-y-unidades-opticas/

banifox:
    enabled: true

    defaults:
        request_delay: 1.5
        max_pages_per_url: 20

    jobs:
        - name: gpu_category
          urls:
              - https://www.banifox.com/tarjetas-de-video/n2-14/

        - name: cpu_category
          urls:
              - https://www.banifox.com/procesadores/n2-11/

        - name: ram_category
          urls:
              - https://www.banifox.com/memorias-ram/n2-9/

        - name: ssd_category
          urls:
              - https://www.banifox.com/almacenamiento/n2-1/

pccompu:
    enabled: true

    defaults:
        request_delay: 1.5
        max_pages_per_url: 20

    jobs:
        - name: gpu_category
          urls:
              - https://www.pccompu.com.uy/catalogo/componentes/tarjetas-de-video/
        - name: cpu_category
          urls:
              - https://www.pccompu.com.uy/catalogo/componentes/procesadores/
        - name: ram_category
          urls:
              - https://www.pccompu.com.uy/catalogo/componentes/memoria-ram/
        - name: ssd_category
          urls:
              - https://www.pccompu.com.uy/catalogo/componentes/almacenamiento/
