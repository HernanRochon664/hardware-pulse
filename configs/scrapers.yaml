# ---------------------------------------------------------------------------
# Scraper configuration for hardware-pulse
#
# Precedence rules:
# job.* overrides scraper.defaults.* overrides global.*
#
# request_delay applies between HTTP requests.
# ---------------------------------------------------------------------------

global:
    request_delay: 1.0
    timeout: 10

mercadolibre:
  enabled: true

  defaults:
    max_offsets_per_query: 10
    request_delay: 2.0

  jobs:
    - name: nvidia_gpus
      queries:
        - "rtx 4070"
        - "rtx 4060"
        - "rtx 4080"

    - name: amd_gpus
      queries:
        - "rx 7800 xt"
        - "rx 7900 xt"

thot:
    enabled: true

    defaults:
        request_delay: 1.5
        max_pages_per_url: 20

    jobs:
        - name: gpu_category
          urls:
              - https://thotcomputacion.com.uy/categoria-producto/tarjetas-de-video/

        - name: cpu_category
          urls:
              - https://thotcomputacion.com.uy/categoria-producto/procesadores/

banifox:
    enabled: true

    defaults:
        request_delay: 1.5
        max_pages_per_url: 20

    jobs:
        - name: gpu_category
          urls:
            - https://www.banifox.com/tarjetas-de-video/n2-14/

        - name: cpu_category
          urls:
              - https://www.banifox.com/procesadores/n2-11/
