# ---------------------------------------------------------------------------
# Scraper configuration for hardware-pulse
#
# Precedence rules:
# job.* overrides scraper.defaults.* overrides global.*
#
# request_delay applies between HTTP requests.
# ---------------------------------------------------------------------------

global:
    request_delay: 1.0
    timeout: 10

thot:
    enabled: true

    defaults:
        request_delay: 1.5
        max_pages_per_url: 20

    jobs:
        - name: gpu_category
          urls:
              - https://thotcomputacion.com.uy/categoria-producto/tarjetas-de-video/

        - name: cpu_category
          urls:
              - https://thotcomputacion.com.uy/categoria-producto/procesadores/

banifox:
    enabled: true

    defaults:
        request_delay: 1.5
        max_pages_per_url: 20

    jobs:
        - name: gpu_category
          urls:
              - https://www.banifox.com/tarjetas-de-video/n2-14/

        - name: cpu_category
          urls:
              - https://www.banifox.com/procesadores/n2-11/

pccompu:
    enabled: true

    defaults:
        request_delay: 1.5
        max_pages_per_url: 20

    jobs:
        - name: gpu_category
          urls:
              - "https://www.pccompu.com.uy/productos/productos.php?path=0.20262.20276&secc=productos&order=7&mo=1&pagina=0"
        - name: cpu_category
          urls:
              - "https://www.pccompu.com.uy/productos/productos.php?path=0.20262.20264&secc=productos&order=7&mo=1&pagina=0"
