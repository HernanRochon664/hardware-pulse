# Canonical product catalog
# Each entry represents a product model tracked by the system.
#
# Fields:
# - sku: Canonical product identifier (e.g., "RTX 4070", "i5 12400F")
# - brand_family: Manufacturer family (NVIDIA, AMD, Intel)
# - category: Product category ("GPU" or "CPU")
# - release_year: Launch year
# - notes: Optional metadata for disambiguation
#
# Format:
# - SKUs use standard spacing: "RTX 4070" not "RTX4070"
# - All SKUs are case-insensitive during matching
# - This catalog is the source of truth for entity resolution

